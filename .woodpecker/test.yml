when:
  branch: master
  event: push

steps:
  - name: test
    image: alpine:latest
    commands:
      - apk add --no-cache \
        git \
        ffmpeg \
        lame \
        bc \
        jq \
        coreutils \
        findutils \
        python3 \
        py3-pip \
        gum
      - python3 -m venv .venv
      - . .venv/bin/activate
      - pip install auto-editor
      - export MXTP_ROOT_DIR=$(pwd)
      - export MXTP_ENV="test"
      - find . -name "*.sh" -exec chmod +x {} +
      - bash lib/bashunit tests
